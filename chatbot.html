<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인천대학교 산학협력팀 통합 안내 챗봇</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --inu-blue:#004090; --inu-deep:#002D66; --inu-light:#1A5FB4;
  --inu-gold:#F0A010; --inu-gold-deep:#D88E00; --inu-gold-soft:#FEF4DE;
  --inu-sky:#EAF1FA; --ink:#26313D; --line:#D8E2EE; --bg:#F2F6FB;
  --rise-teal:#0E8B9B; --rise-teal-deep:#0A6F7D; --rise-navy:#34357F; --rise-navy-deep:#262659; --rise-accent:#19A5B5;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Pretendard",-apple-system,"Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px;}
.app{width:100%;max-width:480px;height:92vh;max-height:840px;background:#fff;border-radius:20px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 18px 50px rgba(0,45,102,.20);border:1px solid var(--line);}
.header{background:linear-gradient(120deg,var(--inu-deep) 0%,var(--inu-blue) 72%);color:#fff;padding:18px 20px 14px;position:relative;flex-shrink:0;overflow:hidden;}
.header::before,.header::after{content:"";position:absolute;border-top-style:solid;border-right-style:solid;border-color:var(--inu-gold);transform:rotate(45deg);}
.header::before{display:block;width:40px;height:40px;border-width:10px;right:122px;top:20px;opacity:.95;filter:drop-shadow(0 2px 4px rgba(0,0,0,.18));}
.header::after{display:block;width:40px;height:40px;border-width:10px;right:144px;top:20px;opacity:.28;}
.header.f-rise::before,.header.f-rise::after{display:none;}
.header.f-rise{background:linear-gradient(115deg,var(--rise-teal-deep) 0%,var(--rise-teal) 26%,var(--rise-navy) 74%,var(--rise-navy-deep) 100%);}
.header.f-rise .chev{color:#fff;opacity:.92;}
.header.f-rise .gold-rule{background:linear-gradient(90deg,var(--rise-teal) 0%,var(--rise-accent) 45%,var(--rise-navy) 100%);}
.header.f-rise h1,.header.f-rise p{padding-right:150px;}
.header.f-rise .logo-chip img{height:38px;}
.header .chev{color:var(--inu-gold);font-weight:900;letter-spacing:-2px;font-size:20px;line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.2);position:relative;}
.header h1{font-size:17px;font-weight:800;margin-top:2px;letter-spacing:-.3px;position:relative;padding-right:96px;}
.header p{font-size:11.5px;opacity:.82;margin-top:2px;position:relative;padding-right:96px;}
.header .logo-chip{position:absolute;right:16px;top:15px;background:#fff;border-radius:10px;padding:6px 10px;box-shadow:0 3px 12px rgba(0,0,0,.22);display:flex;align-items:center;z-index:2;}
.header .logo-chip img{height:28px;display:block}
.header .gold-rule{position:absolute;left:0;right:0;bottom:0;height:3px;background:linear-gradient(90deg,var(--inu-gold) 0%,var(--inu-gold) 40%,rgba(240,160,16,.25) 100%);}
/* 분야 전환 칩 */
.field-tabs{display:flex;gap:5px;margin-top:11px;position:relative;flex-wrap:wrap;}
.field-tab{font-size:11px;font-weight:600;border-radius:999px;padding:4px 11px;cursor:pointer;border:none;font-family:inherit;transition:.15s;background:rgba(255,255,255,.16);color:#cdddf0;}
.field-tab.active{background:var(--inu-gold);color:#3a2600;font-weight:700;}
.field-tab:hover:not(.active){background:rgba(255,255,255,.28);}
.field-tab:focus-visible{outline:2px solid #fff;outline-offset:1px;}
.chat{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:12px;background:radial-gradient(circle at 88% 6%, rgba(0,64,144,.05), transparent 42%),var(--bg);}
.row{display:flex;gap:8px;align-items:flex-end;animation:pop .25s ease}
.row.user{flex-direction:row-reverse}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:var(--inu-blue);color:var(--inu-gold);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;padding-bottom:2px;}
.row.user .avatar{background:#5B6B7A;color:#fff;font-size:12px;font-weight:800;padding-bottom:0}
.bubble{max-width:80%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.65;word-break:keep-all;position:relative;}
.row.bot .bubble{background:#fff;border:1px solid var(--line);border-left:3px solid var(--inu-gold);border-bottom-left-radius:4px;box-shadow:0 2px 6px rgba(0,45,102,.06);}
.row.user .bubble{background:var(--inu-blue);color:#fff;border-bottom-right-radius:4px;}
.bubble b{color:var(--inu-blue)}
.row.user .bubble b{color:#fff}
.bubble .hl{color:var(--inu-gold-deep);font-weight:700}
.bubble .warn{display:block;background:var(--inu-gold-soft);border:1px solid var(--inu-gold);border-radius:8px;padding:7px 10px;margin-top:8px;font-size:12.5px;color:var(--inu-deep);}
.bubble .warn b{color:var(--inu-gold-deep)}
.tbl{width:100%;border-collapse:collapse;margin:8px 0 4px;font-size:12.5px;border-radius:8px;overflow:hidden;}
.tbl th{background:var(--inu-blue);color:#fff;padding:6px 8px;font-weight:700;text-align:center;white-space:nowrap;}
.tbl td{border-bottom:1px solid var(--line);padding:6px 8px;text-align:center;background:#fff;}
.tbl td:first-child{text-align:left;font-weight:600;background:var(--inu-sky);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.bubble .pick{display:inline-block;background:var(--inu-gold-soft);border:1.5px solid var(--inu-gold);color:var(--inu-deep);border-radius:999px;padding:5px 13px;margin:6px 4px 0 0;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.bubble .pick:hover{background:var(--inu-gold);color:#fff}
/* 가족회사 등급 배지 */
.tier{display:inline-block;border-radius:5px;padding:1px 7px;font-size:12px;font-weight:700;}
.tier.basic{background:#EEF1F4;color:#5B6B7A}
.tier.silver{background:#E5E9EE;color:#5A6B7B}
.tier.gold{background:var(--inu-gold-soft);color:var(--inu-gold-deep)}
.tier.plat{background:#E7EEF8;color:var(--inu-blue)}
.copy-btn{display:inline-flex;align-items:center;gap:4px;margin-top:9px;background:#fff;border:1.5px solid var(--line);color:var(--inu-blue);border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.copy-btn::before{content:"\29C9";color:var(--inu-gold);font-weight:900;font-size:13px}
.copy-btn:hover{border-color:var(--inu-gold);background:var(--inu-gold-soft)}
.copy-btn.done{border-color:var(--inu-gold);background:var(--inu-gold-soft);color:var(--inu-gold-deep)}
.copy-btn.done::before{content:"\2713"}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;padding-left:40px}
.chip{background:#fff;border:1.5px solid var(--line);color:var(--inu-blue);border-radius:999px;padding:6px 13px 6px 11px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit;}
.chip::before{content:"\203A ";color:var(--inu-gold);font-weight:900}
.chip:hover{border-color:var(--inu-gold);background:var(--inu-gold-soft);transform:translateY(-1px)}
.chip:focus-visible,.pick:focus-visible,.copy-btn:focus-visible,.field-card:focus-visible{outline:2px solid var(--inu-gold);outline-offset:2px}
/* 분야 선택 카드 */
.field-select{padding:6px 4px;}
.field-card{display:flex;align-items:center;gap:12px;width:100%;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;font-family:inherit;text-align:left;transition:.16s;}
.field-card:hover{border-color:var(--inu-gold);background:var(--inu-gold-soft);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,45,102,.08);}
.field-card .ic{width:42px;height:42px;border-radius:11px;background:var(--inu-sky);color:var(--inu-blue);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.field-card .tx b{display:block;font-size:14.5px;color:var(--inu-blue);font-weight:800;margin-bottom:2px;}
.field-card .tx span{font-size:12px;color:#6B7F92;}
.field-card .go{margin-left:auto;color:var(--inu-gold);font-weight:900;font-size:18px;}
.typing{display:flex;gap:2px;padding:2px 2px}
.typing i{font-style:normal;color:var(--inu-gold);font-weight:900;font-size:15px;animation:flow 1.2s infinite;}
.typing i:nth-child(2){animation-delay:.2s}
.typing i:nth-child(3){animation-delay:.4s}
@keyframes flow{0%,80%,100%{opacity:.2;transform:translateX(0)}40%{opacity:1;transform:translateX(2px)}}
.input-bar{display:flex;gap:8px;padding:12px 14px;background:#fff;border-top:1px solid var(--line);flex-shrink:0;}
.input-bar input{flex:1;border:1.5px solid var(--line);border-radius:999px;padding:11px 18px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s, box-shadow .15s;}
.input-bar input:focus{border-color:var(--inu-gold);box-shadow:0 0 0 3px rgba(240,160,16,.15)}
.input-bar input:disabled{background:#F2F6FB;color:#9AAEC0;}
.input-bar button{background:var(--inu-blue);color:#fff;border:none;border-radius:999px;padding:0 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;display:flex;align-items:center;gap:4px;}
.input-bar button .arrow{color:var(--inu-gold);font-weight:900;font-size:16px;transition:transform .15s}
.input-bar button:hover{background:var(--inu-deep)}
.input-bar button:hover .arrow{transform:translateX(3px)}
.input-bar button:focus-visible{outline:2px solid var(--inu-gold);outline-offset:2px}
.foot{text-align:center;font-size:10.5px;color:#8AA0B5;padding:0 14px 10px;background:#fff;flex-shrink:0;}
@media (prefers-reduced-motion:reduce){.row{animation:none}.typing i{animation:none;opacity:.6}.input-bar button:hover .arrow{transform:none}}
@media (max-width:420px){body{padding:0}.app{height:100vh;max-height:none;border-radius:0}.bubble{max-width:88%}}
</style>
</head>

  rise_auditDiff: `<b>정산보고서 검증</b>과 <b>특정사업자에 대한 회계감사</b>의 차이입니다.<br><br>

  rise_carryover: `<b>사업비 이월</b> 기준입니다.<br><br>

  rise_extraRefund: `<b>정산·반납 완료 후 추가로 발생한 반납금</b> 처리 방법입니다.<br><br>

  rise_settleTime: `<b>사업비 정산 시기</b>입니다.<br><br>

· 캡스톤디자인 등 교육과정·과제수행용 소프트웨어/라이선스는 <b>'교육·연구 프로그램 개발·운영비'</b>에 재료비로 집행 가능합니다(범용 SW는 직접 연관성 인정이 어려움).<br>
· 최소단위 계약기간(예: 1년)이 사업기간을 초과해도, <b>최소 단위임을 소명</b>하면 계약금액 전부를 계상·집행할 수 있습니다.<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅲ-13·36 · 세부 집행 기준(0.17)</div>`,
  rise_meeting: `<b>회의비·식대</b> 집행 기준입니다.<br><br>
· 교육·연구 프로그램 개발·운영비, 지역 연계·협업·지원비 등과 <b>직접 관련된 회의비·여비</b>는 해당 항목에 편성·집행 가능합니다.<br>
· 회의 식대·다과 등 소요경비는 대학 자체 기준을 준용하되, <span class="hl">식비(다과 포함) 1인 1식 기준 최대 50,000원</span>으로 집행합니다.<br>
· <b>다과비만 집행</b> 시 1인당 최대 10,000원 이내로 제한됩니다.<br>
· 회의·행사 참석자에게 <b>식사와 기념품을 동시 제공</b>하는 경우, 원칙적으로 가액 합산 금액이 1인당 50,000원 이내로 집행되어야 합니다(청탁금지법 등 관련 법령 준수).<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅲ-14~17</div>`,
  rise_businessExp: `<b>업무추진비</b> 집행 가능 여부입니다.<br><br>
· '그 밖의 사업운영 경비' 항목에서 <b>RISE 사업과 직접 관련된 업무 협의·간담회 등 명확한 업무 수행 목적</b>이 있는 활동에 한해 집행 가능합니다.<br>
· 단, 사업단장 등 <span class="hl">단순 보직자의 대외협력 활동을 위한 업무추진비 계상·집행은 제한</span>됩니다.<br>
· 집행목적·참석자 명단·회의록(결과보고서)·지출증빙자료를 구비하고, 식대·다과 등은 대학 자체 기준을 준용해 1인 1식 최대 50,000원(다과만 시 10,000원)으로 집행해 주세요.<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅲ-16</div>`,
  rise_souvenir: `<b>사업 홍보용 기념품 제작·구매</b> 가능 여부입니다.<br><br>
· 사업 홍보를 위한 기념품은 <b>'그 밖의 사업운영 경비'</b>로 집행 가능합니다.<br>
· 단, 사업목적에 부합하지 않거나 사업과 무관한 기념품은 제작·구매할 수 없으며, <b>내부품의서·지출원인행위서</b> 등 집행계획에 근거해 집행해야 합니다.<br>
<span class="warn">⚠ 내부직원 활용 목적의 기념품, 사치성 품목(고급 주류, 고가 수입브랜드 물품, 고가 전자기기 등)은 불가합니다. 집행계획 수립 시 목적·사용처를 명확히 하고 수불대장 등으로 사용내역을 관리해야 합니다.</span><div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅲ-41 · 세부 집행 기준(0.20)</div>`,
  rise_internalExpert: `<b>내부 교직원에게 자문료·강사료 등 수당(전문가활용비)</b> 지급 가능 여부입니다.<br><br>
· 판단 기준은 <span class="hl">'업무 관련성'</span>입니다.<br>
· 대학으로부터 인건비·수당을 받는 내부 교직원의 <b>본 업무범위에 포함되는 활동</b>(기존 강의·연구·학생지도 등)에는 별도 수당 지급이 <b>불가</b>합니다.<br>
· 다만 <b>본 업무범위 외에 RISE 추진으로 발생하는 추가적 활동</b>(신규 교과목 개발 회의수당·자문료, 교재개발 원고료, 기업·의료원·지역민 대상 교육 강의료 등)은 시·도별 세부 기준을 수립해 지원 가능합니다.<br>
<span class="warn">⚠ RISE 사업단 등 추진조직에 소속된 교직원에게는 RISE 관련 업무에 대해 강의료·자문료 등 별도 수당을 지급할 수 없으므로, 성과·기여도에 따라 인건비 내 성과급을 활용하시기 바랍니다.</span><div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅲ-10·32 · 세부 집행 기준(0.15)</div>`,
  rise_outsourcing: `<b>프로그램 운영 관련 위탁(연구)용역</b> 가능 여부입니다.<br><br>
· 학생 창업캠프, 국외 교육프로그램, 지역의료 개선 등 RISE 사업 프로그램 운영과 <b>직접 관련된 위탁(연구)용역</b>은 자체 기준에 따라 가능하나, 철저한 관리가 필요합니다(대학과의 연계 내용 또는 대학의 역할이 포함되어야 함).<br>
· 위탁(연구)용역 계약방법·절차는 <span class="hl">「국가계약법」 및 동 시행령, 「기획재정부 계약예규」</span> 등 관련 법령에 따라야 합니다.<br>
· RISE 사업비로 구축하는 비용이 <b>3천만 원 이상</b>인 연구시설·장비는 산학연 공동기술·지식 개발 시 「국가연구개발사업 연구개발비 사용기준」을 준용합니다.<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅲ-33 · 세부 집행 기준(0.17)</div>`,
  rise_ntis: `<b>연구시설·장비의 NTIS(장비활용종합포털) 등록</b> 기준입니다.<br><br>
· RISE 사업비로 구축한 연구시설·장비는 <span class="hl">NTIS 장비활용종합포털에 등록</span>해야 합니다.<br>
· 대상: 구축비용 <b>3천만 원 이상</b>인 연구시설·장비, 또는 3천만 원 미만이라도 <b>공동활용이 가능한</b> 연구시설·장비.<br>
· <b>자산등재 후 30일 이내</b>에 NTIS에 등록해 주세요.<br>

<span class="warn">⚠ COSS 및 산학협력단지는 3천만 원 이상 장비·기자재 구축 시 NTIS 및 산학연협력 통합정보망(NRICA)에 이중 등록이 필요합니다.</span><div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅲ-35 · 세부 집행 기준(0.17)</div>`,
  rise_equipDeadline: `<b>연구시설·장비 도입 기한</b>입니다.<br><br>
· 연구시설·장비는 당해 사업연도 종료일 <b>2개월 전까지</b> 구입·설치(검수 완료) 또는 임차를 완료해야 합니다.<br>
· 검수까지 소요되는 총 기간을 충분히 고려해 도입하시기 바랍니다.<br>

  rise_studentPay: `<b>산학연 공동 기술·지식 개발(R&D) 학생인건비</b> 편성입니다.<br><br>
· 인건비 항목에 '학생 인건비'가 별도로 없으며, 산학연 공동 기술·지식 개발(R&D) 비용은 <b>'기업 지원·협력 활동비'</b> 항목으로 편성·집행합니다.<br>
· 따라서 연구개발 과정의 학생인건비도 '인건비'가 아닌 <span class="hl">'기업 지원·협력 활동비'</span>에서, 「국가연구개발혁신법 시행령」 제20조제1항 '연구개발비 사용용도'에 준해 세부 지침 수립 후 지원합니다.<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅲ-38 · 세부 집행 기준(0.19)</div>`,
  rise_prepay: `<b>선(先)결제 방식 집행</b> 가능 여부입니다.<br><br>
· 사업비는 <b>원인행위 없이 지출할 수 없으므로</b>, 세부 프로그램 운영을 위해 필요하더라도 <span class="hl">선결제 방식 집행은 불가</span>합니다.<br>
· (예시) 교통카드 미리 충전 후 학생팀별 지급, 회의비 선결제(사전 식권 구매 포함), 주차권 선구매 등은 불가합니다.<br>
<span class="warn">⚠ 선결제 방식으로 사업비를 사적 유용하는 경우 「보조금 관리에 관한 법률」 등에 따라 제재처분을 받을 수 있습니다.</span><div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ 사업비 관리(6.6)-14</div>`,
  rise_cardRule: `<b>학생 지원금 등 결제·증빙 방식</b>입니다.<br><br>
· 사업비는 원칙적으로 세금계산서 청구를 근거로 계산서 발행자에게 계좌이체하며, 인건비·회의수당·성과급 등 개인 지급 경비를 제외하고는 <span class="hl">e나라도움 카드로 집행</span>합니다.<br>
· 다만 교육 프로그램 운영 관련 <b>학생(팀)에게 지원되는 교통비·재료비</b> 등은, 학생이 개인카드 등으로 결제하고 추후 영수증 증빙을 확인해 해당 비용을 학생에게 <b>계좌이체(사업단→학생)</b>하는 방식이 가능합니다.<br>
· 이 경우 e나라도움에 관련 학생이 결제한 영수증 등 증빙을 모두 첨부해야 합니다.<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ 사업비 관리(6.6)-15</div>`,
  rise_enaraManual: `<b>e나라도움 매뉴얼·참고자료</b> 안내입니다.<br><br>
· e나라도움 보조사업자 과정 교재는 사업수행 단계별 업무 강의자료입니다.<br>
· 상세 업무별 가이드는 <span class="hl">「e나라도움 업무시스템 사용자 매뉴얼」</span>을 통해 확인하실 수 있습니다(인건비 보조금계좌 이체 집행 방법, 자체계약 계약집행 등록방법, 집행취소 및 집행정보 수정, 보조금 교부 전 기관자체비용 집행 시 처리방법 등).<br>
· 추가 문의는 <b>한국재정정보원 e나라도움 고객센터</b>를 이용해 주세요.<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅳ-1 · e나라도움</div>`,
  rise_etaxInvoice: `<b>전자세금계산서 스캔본 첨부 집행</b> 가능 여부입니다.<br><br>
· 「국고보조금 통합관리지침」에 따라 보조금 지출 시 전자세금계산서는 <span class="hl">e나라도움 시스템에 전자적 형태로 수신된 정보만</span> 제출해야 합니다.<br>
· 따라서 <b>기타증빙을 통해 전자세금계산서·카드매출전표 등의 스캔본을 첨부하여 집행할 수 없습니다.</b><br>
· (예외) 교통·통신시설 미비 등으로 사용·제출이 곤란한 경우에 한해, 중앙관서의 장이 증빙자료 중복·누락 방지를 위해 사용내역을 상세히 점검·관리합니다.<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅳ-2 · 국고보조금 통합관리지침</div>`,
  rise_salaryTransfer: `<b>인건비 보조금계좌 이체 집행</b> 시 유의사항입니다.<br><br>
· 인건비 지급 관련 계좌 이체 방법은 e나라도움 <b>「인건비 보조금계좌로이체 집행 방법(보조사업자)」 매뉴얼</b>을 참고해 주세요.<br>
· <span class="hl">다수 인원의 인건비를 한 건으로 집행등록</span>하는 경우, 집행등록의 <b>'인력등록'</b>을 통해 반드시 인건비 지급대상을 입력해 주시기 바랍니다.<div style="margin-top:9px;font-size:10.5px;color:#8A98A8;border-top:1px dashed #E0E8F0;padding-top:6px;">📖 근거: RISE 인천시 FAQ Ⅳ-3</div>`,
  rise_contractReg: `<b>물품 조달·용역 계약의 e나라도움 등록</b> 절차입니다.<br><br>

/* 분야 한정 인텐트 후보 랭킹 */
function tokenize(q){ return (q.match(/[가-힣a-z0-9]{2,}/g) || []); }

function rankIntents(text, field){
  const q = text.toLowerCase().replace(/\s+/g,' ').trim();
  const toks = tokenize(q);
  const scored = [];
  for(const it of INTENTS){
    if(it.scope !== field) continue;            // ★ 현재 분야만 검색
    let score = 0, fullHits = 0;
    for(const k of it.kw){
      const kl = k.toLowerCase();
      if(q.includes(kl)){ score += it.w + kl.length*0.5; fullHits++; }
      else {
        for(const t of toks){
          if(t.length<2) continue;
          if(kl.includes(t) || t.includes(kl)){
            const ov=Math.min(t.length, kl.length);
            score += Math.min(it.w*0.18 + ov*0.05, 1.2);
            break;
          }
        }
      }
    }
    if(fullHits>0) score += 2.0 + (fullHits-1)*0.5;
    if(HUB_KEYS[it.id] && HUB_KEYS[it.id].includes(q)) score += 100;
    if(score>0) scored.push({id:it.id, score, fullHits});
  }
  scored.sort((a,b)=>b.score-a.score);
  return scored;
}

/* DOM */
const chat = document.getElementById('chat');
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const fieldTabs = document.getElementById('fieldTabs');

/* ───── 분야 선택 시작 화면 ───── */
function showFieldSelect(){
  // 헤더 초기 상태로 복원 (분야 미선택)
  const hdr=document.querySelector('.header');
  hdr.classList.remove('f-fam','f-res','f-rise');
  document.getElementById('hdrTitle').textContent='산학협력팀 통합 안내';
  document.getElementById('hdrSub').textContent='INU 산학협력단 · 분야를 선택해 주세요';
  document.getElementById('foot').textContent='※ 본 챗봇은 인천대학교 산학협력단 안내용입니다. 집행·신청 전 담당 부서에 최종 확인해 주세요.';
  const logo=document.getElementById('hdrLogo'); logo.src=INU_LOGO; logo.alt='인천대학교 INU 로고';
  fieldTabs.style.display='none';
  input.disabled=true; input.placeholder='먼저 위에서 분야를 선택해 주세요';
  currentField=null;
  chat.innerHTML='';
  const row=document.createElement('div');
  row.className='row bot';
  row.innerHTML='<div class="avatar">\u203A</div>';
  const b=document.createElement('div');
  b.className='bubble';
  b.innerHTML='안녕하세요, 반갑습니다. 😊 <b>인천대학교 산학협력팀 통합 안내 챗봇</b>입니다.<br>어떤 분야가 궁금하신가요? 아래에서 골라 주세요. 🙌'
    +'<div class="field-select" style="margin-top:10px;">'
    +'<button class="field-card" onclick="switchField(\'fam\')"><span class="ic">\uD83E\uDD1D</span><span class="tx"><b>가족회사 멤버십</b><span>등급·연회비·혜택·가입·컨설팅</span></span><span class="go">\u203A</span></button>'
    +'<button class="field-card" onclick="switchField(\'res\')"><span class="ic">\uD83D\uDCB0</span><span class="tx"><b>연구비 집행</b><span>비목·인건비·회의비·여비·물품·정산</span></span><span class="go">\u203A</span></button>'
    +'<button class="field-card" onclick="switchField(\'rise\')"><span class="ic">\uD83C\uDF93</span><span class="tx"><b>RISE 사업비</b><span>편성비율·항목별 기준·정산·e나라도움</span></span><span class="go">\u203A</span></button>'
    +'</div>';
  row.appendChild(b);
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
}

/* ───── 분야 전환 ───── */
function switchField(f){
  currentField=f;
  const meta=FIELDS[f];
  document.getElementById('hdrTitle').textContent=meta.title;
  document.getElementById('hdrSub').textContent=meta.sub;
  document.getElementById('foot').textContent=meta.foot;
  // 헤더 분야 클래스 (색·꺽쇠 전환)
  const hdr=document.querySelector('.header');
  hdr.classList.remove('f-fam','f-res','f-rise');
  hdr.classList.add('f-'+f);
  // 로고 교체: RISE는 사업단 로고, 그 외 INU 로고
  const logo=document.getElementById('hdrLogo');
  if(f==='rise'){ logo.src=RISE_LOGO; logo.alt='인천대학교 RISE 사업단 로고'; }
  else { logo.src=INU_LOGO; logo.alt='인천대학교 INU 로고'; }
  fieldTabs.style.display='flex';
  fieldTabs.querySelectorAll('.field-tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.field===f);
  });
  input.disabled=false;
  input.placeholder='궁금한 점을 입력하세요';
  closerIdx=0;
  chat.innerHTML='';
  addBubble(ANSWERS[f+'_greeting'], 'bot', false);
  addChips();
  input.focus();
}

/* ───── 버블 ───── */
function addBubble(html, who, withCopy){
  const row=document.createElement('div');
  row.className='row '+who;
  const av=document.createElement('div');
  av.className='avatar';
  av.textContent= who==='bot' ? '\u203A' : '\uB098';
  const b=document.createElement('div');
  b.className='bubble';
  b.innerHTML=html;
  if(who==='bot' && withCopy){
    const cp=document.createElement('button');
    cp.className='copy-btn'; cp.type='button'; cp.textContent='\uBCF5\uC0AC';
    cp.onclick=()=>copyText(b,cp);
    b.appendChild(document.createElement('br'));
    b.appendChild(cp);
  }
  row.appendChild(av); row.appendChild(b);
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
  return row;
}

function copyText(bubble, btn){
  const clone=bubble.cloneNode(true);
  clone.querySelectorAll('.copy-btn,.pick').forEach(e=>e.remove());
  clone.querySelectorAll('table').forEach(tb=>{
    let txt='\n';
    tb.querySelectorAll('tr').forEach(tr=>{
      txt+=[...tr.children].map(td=>td.textContent.trim()).join(' | ')+'\n';
    });
    tb.replaceWith(document.createTextNode(txt));
  });
  clone.querySelectorAll('br').forEach(br=>br.replaceWith(document.createTextNode('\n')));
  let text=(clone.textContent||'').replace(/\n{3,}/g,'\n\n').trim();
  const done=()=>{btn.classList.add('done');btn.textContent='\uBCF5\uC0AC\uB428';setTimeout(()=>{btn.classList.remove('done');btn.textContent='\uBCF5\uC0AC';},1600);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fbCopy(text,done));
  } else fbCopy(text,done);
}
function fbCopy(text,cb){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);cb();
}

/* ───── 빠른 버튼 ───── */
function addChips(){
  const old=document.getElementById('chips'); if(old) old.remove();
  const wrap=document.createElement('div');
  wrap.className='chips'; wrap.id='chips';
  (QUICKS[currentField]||[]).forEach(([label,q])=>{
    const c=document.createElement('button');
    c.className='chip'; c.textContent=label;
    c.onclick=()=>handleSend(q);
    wrap.appendChild(c);
  });
  chat.appendChild(wrap);
  chat.scrollTop=chat.scrollHeight;
}

/* ───── 타이핑 ───── */
function showTyping(){
  const row=document.createElement('div');
  row.className='row bot'; row.id='typing';
  row.innerHTML='<div class="avatar">\u203A</div><div class="bubble"><div class="typing"><i>\u203A</i><i>\u203A</i><i>\u203A</i></div></div>';
  chat.appendChild(row); chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

/* ───── 안전망: 후보 추천 ───── */
function buildSuggest(cands){
  const picks=cands.filter(c=>!isHub(c.id)&&LABELS[c.id]).slice(0,4);
  if(!picks.length) return null;
  let html='혹시 이 중에 찾으시는 내용이 있으신가요? 🤔 아래에서 골라 주세요.<br>';
  picks.forEach(c=>{
    const label=LABELS[c.id];
    html+=`<button class="pick" onclick="handleSend('${label.replace(/'/g,'')}')">${label}</button>`;
  });
  html+=`<br><span style="color:#6B7F92;font-size:12px">원하시는 내용이 없으면, 조금 더 구체적으로 입력하시거나 아래 빠른 버튼을 눌러 주세요.</span>`;
  return html;
}

/* ───── 전송 처리 ───── */
function handleSend(text){
  if(!currentField) return;
  const msg=(text!==undefined?text:input.value).trim();
  if(!msg) return;
  input.value='';
  const chips=document.getElementById('chips'); if(chips) chips.remove();
  addBubble(escapeHtml(msg),'user',false);
  showTyping();
  const cands=rankIntents(msg, currentField);
  setTimeout(()=>{
    hideTyping();
    const top=cands[0]||null, second=cands[1]||null;
    const topFull=top&&top.fullHits>0;
    const gap=second?top.score-second.score:99;
    const confident=top&&topFull&&top.score>=5&&gap>=1.0;
    const hub=top&&isHub(top.id);
    if(top&&(confident||hub)){
      const id=top.id;
      let answer=ANSWERS[id];
      if(!isHub(id)){
        answer+='<br><br><span style="color:#6B7F92;font-size:12.5px">'+CLOSERS[closerIdx%CLOSERS.length]+'</span>';
        closerIdx++;
      }
      addBubble(answer,'bot',!isHub(id));
    } else {
      const sugg=buildSuggest(cands);
      addBubble(sugg||ANSWERS[currentField+'_fallback'],'bot',false);
    }
    addChips();
  }, 480+Math.random()*360);
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

sendBtn.onclick=()=>handleSend();
input.addEventListener('keydown',e=>{if(e.key==='Enter')handleSend();});

/* 시작 */
showFieldSelect();
</script>
